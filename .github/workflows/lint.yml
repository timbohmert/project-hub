name: Lint UI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: project-hub-ui/package-lock.json

      - name: Install dependencies
        working-directory: ./project-hub-ui
        run: npm ci

      - name: Run lint
        working-directory: ./project-hub-ui
        run: npm run lint
